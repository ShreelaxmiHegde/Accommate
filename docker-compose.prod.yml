# ------ Deployment ------

services:
  # Client service
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "80:80"
    
    networks:
      - app_network
    
    depends_on:
      - backend
    
  # Server service
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"

    networks:
      - app_network
    
    depends_on:
      - database

# Network
networks:
  app_network:
    driver: bridge