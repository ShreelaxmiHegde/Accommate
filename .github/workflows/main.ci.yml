name: Main CI

on:
  push:
    branches: ["main"]

jobs:

  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [server]
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: ./${{ matrix.service }}
        run: npm install

      - name: Run tests
        working-directory: ./${{ matrix.service }}
        run: npm test

      - name: Build docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/accommate-backend:${GITHUB_SHA::7} ./${{ matrix.service }}

      - name: Login to dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Push docker image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/accommate-backend:${GITHUB_SHA::7}


  frontend:
    needs: backend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [client]
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies and build frontend
        working-directory: ./${{ matrix.service }}
        run: npm install

      - name: Build frontend
        working-directory: ./${{ matrix.service }}
        run: npm run build

      - name: Run tests
        working-directory: ./${{ matrix.service }}
        run: npm test --test

      - name: Build docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/accommate-frontend:${GITHUB_SHA::7} ./${{ matrix.service }}

      - name: Debug docker images
        run: docker images

      - name: Login to dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Push docker image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/accommate-frontend:${GITHUB_SHA::7}